<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackboard Cariocada</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <h1>Sistema de Estoque Cariocada</h1>

    <div class="container">
        <div class="card">
            <h2>Registrar Venda (Especialistas Loja)</h2>
            <div style="margin-bottom: 15px;">
                <label for="selectLoja">Loja: </label>
                <select id="selectLoja"></select>
                
                <label for="selectProduto">Produto: </label>
                <select id="selectProduto"></select>

                <label for="inputQtd">Qtd: </label>
                <input type="number" id="inputQtd" value="5" min="1" style="width: 60px;">
            </div>
            
            <button onclick="vender()">Confirmar Venda</button>
            
            <div id="logVenda" class="log-box">Aguardando operações...</div>
            
            <div class="regras-container">
                <strong>Regras Customizadas:</strong>
                <p id="regraTijuca"></p>
                <p id="regraMeier"></p>
            </div>
        </div>

        <div class="card">
            <h2>Estado Central do Blackboard</h2>
            <h3>Estoques Atuais:</h3>
            
            <div class="quadros-lojas">
                <div class="quadro-loja">
                    <h4>Loja Méier</h4>
                    <table class="tabela-loja">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaMeier"></tbody>
                    </table>
                </div>

                <div class="quadro-loja">
                    <h4>Loja Tijuca</h4>
                    <table class="tabela-loja">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaTijuca"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="alert-box">
        <h3>Quadro de Decisões Compartilhado (Especialista Reposição)</h3>
        <ul id="listaAlertas"></ul>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
